<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | {{ app_name }}</title>
    <link rel="icon" href="{{ static_asset('favicon.ico') }}">
    <link rel="stylesheet" href="{{ static_asset('css/site.css') }}">
    <script defer src="{{ static_asset('js/filters.js') }}"></script>
  </head>
  <body>
    <div class="page-shell">
      {% include "partials/nav.html" %}
      {% if uses_mock_data %}
      <div class="notice">
        Running in mock-data mode. Set `TTS_API_KEY` and `TTS_API_SECRET` to use live TimeToScore data.
      </div>
      {% endif %}
      <main class="main-content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
