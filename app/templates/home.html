{% extends "base.html" %}

{% block content %}
<section class="hero">
  <p class="eyebrow">{{ current_season.label }}</p>
</section>

<section class="panel-grid">
  <article class="panel">
    <h2>Divisions</h2>
    <div class="chip-list">
      {% for division in divisions %}
      <a class="chip" href="/standings?division={{ division.id }}">{{ division.name }}</a>
      {% endfor %}
    </div>
  </article>

  <article class="panel">
    <h2>Teams</h2>
    <div class="link-list">
      {% for team in teams %}
      <a href="/teams/{{ team.id }}">{{ team.name }}</a>
      {% endfor %}
    </div>
  </article>
</section>

<section class="panel">
  <div class="section-head">
    <h2>Upcoming Games</h2>
    <a href="/schedule">Full schedule</a>
  </div>
  {% include "partials/game_list.html" %}
</section>
{% endblock %}
