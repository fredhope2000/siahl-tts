{% if standings %}
<div class="table-wrap">
  <table class="data-table standings-table-compact">
    <colgroup>
      <col class="col-team">
      <col class="col-record">
      <col class="col-points">
    </colgroup>
    <thead>
      <tr>
        <th>Team</th>
        <th>Record</th>
        <th>PTS</th>
      </tr>
    </thead>
    <tbody>
      {% for row in standings %}
      <tr>
        <td><a href="/teams/{{ row.team_id }}">{{ row.team_name }}</a></td>
        <td>{{ row.w or 0 }}-{{ row.l or 0 }}-{{ row.t or 0 }}-{{ row.otl or 0 }}</td>
        <td>{{ row.pts or "-" }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<p class="empty-state">No standings available.</p>
{% endif %}
